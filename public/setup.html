<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HAICO - Setup</title>
  <link rel="icon" type="image/svg+xml" href="/public/brand/haico-mark.svg">
  <link rel="icon" type="image/x-icon" href="/public/favicon.ico">
  <link rel="stylesheet" href="/public/css/auth.css">
  <script defer src="/public/vendor/htmx.min.js"></script>
  <script type="module" src="/public/js/pages/auth-pages.js"></script>
</head>
<body>
  <div class="card">
    <h1><span>HAICO</span></h1>
    <p class="subtitle">Set a password to protect your platform</p>
    <form id="setup-form" class="auth-form" data-auth-action="setup" hx-post="/api/auth/setup" hx-swap="none">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter password (min 4 chars)" autofocus required>
      <label for="confirm">Confirm password</label>
      <input type="password" id="confirm" name="confirm" placeholder="Confirm password" required>
      <button type="submit">Set Password</button>
      <div class="error" id="error"></div>
      <div class="success" id="success"></div>
    </form>
  </div>
</body>
</html>
