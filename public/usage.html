<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usage - HAICO</title>
  <link rel="icon" type="image/svg+xml" href="/public/brand/haico-mark.svg">
  <link rel="icon" type="image/x-icon" href="/public/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/public/favicon-32.png">
  <link rel="apple-touch-icon" href="/public/apple-touch-icon.png">
  <script src="/public/js/shared/theme.js"></script>
  <link rel="stylesheet" href="/public/css/index.css">
</head>
<body class="dashboard-shell" data-dashboard-page="usage">
  <div data-dashboard-sidebar>
    <nav class="vertical-sidebar dashboard-sidebar-skeleton" aria-hidden="true">
      <span class="sidebar-logo sidebar-skeleton-logo"></span>
      <span class="sidebar-nav-item sidebar-skeleton-item"><span class="sidebar-skeleton-icon"></span><span class="sidebar-skeleton-label"></span></span>
      <span class="sidebar-nav-item sidebar-skeleton-item"><span class="sidebar-skeleton-icon"></span><span class="sidebar-skeleton-label"></span></span>
      <span class="sidebar-nav-item sidebar-skeleton-item"><span class="sidebar-skeleton-icon"></span><span class="sidebar-skeleton-label"></span></span>
      <span class="sidebar-nav-item sidebar-nav-settings sidebar-skeleton-item"><span class="sidebar-skeleton-icon"></span><span class="sidebar-skeleton-label"></span></span>
    </nav>
  </div>

  <header>
    <div class="header-right">
      <a class="btn btn-primary btn-sm" href="/projects/new">+ New Project</a>
      <span class="header-user-skeleton" aria-hidden="true">
        <span class="header-skeleton-sound"></span>
        <span class="header-skeleton-avatar"></span>
      </span>
    </div>
  </header>

  <main id="main-content" class="container">
    <!-- Cost Alert Banner -->
    <div id="cost-alert-banner" class="dashboard-view dashboard-view-usage" style="display:none;margin-bottom:16px">
      <div class="card" style="border-left:3px solid var(--error);padding:12px 16px">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <strong style="font-size:13px;color:var(--error)">Cost Alert</strong>
            <span id="cost-alert-text" style="font-size:12px;margin-left:8px;color:var(--text-secondary)"></span>
          </div>
          <button class="btn btn-sm" data-action="dismiss-cost-alert" style="font-size:11px">Dismiss</button>
        </div>
      </div>
    </div>

    <!-- Usage by Project Chart -->
    <div id="usage-by-project-panel" class="card dashboard-view dashboard-view-usage" style="display:none;margin-bottom:16px;padding:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <strong style="font-size:14px">Usage by Project</strong>
        <div style="display:flex;gap:4px">
          <button class="btn btn-sm usage-period-btn" data-action="usage-period" data-period="hour">Hour</button>
          <button class="btn btn-sm usage-period-btn active" data-action="usage-period" data-period="day">Day</button>
          <button class="btn btn-sm usage-period-btn" data-action="usage-period" data-period="week">Week</button>
          <button class="btn btn-sm usage-period-btn" data-action="usage-period" data-period="month">Month</button>
        </div>
      </div>
      <div id="usage-by-project-chart"></div>
    </div>
  </main>
  <script src="/public/js/shared/common.js"></script>
  <script type="module" src="/public/js/components/toast.js"></script>
  <script type="module" src="/public/js/components/confirm.js"></script>
  <script src="/public/js/components/dashboard-sidebar.js"></script>
  <script src="/public/js/shared/ws-client.js"></script>
  <script type="module" src="/public/js/pages/dashboard-usage.js"></script>
</body>
</html>
