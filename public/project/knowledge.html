<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HAICO - Project</title>
  <link rel="icon" type="image/svg+xml" href="/public/brand/haico-mark.svg">
  <link rel="icon" type="image/x-icon" href="/public/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/public/favicon-32.png">
  <link rel="apple-touch-icon" href="/public/apple-touch-icon.png">
  <link rel="stylesheet" href="/public/css/style.css?v=9">
  <link rel="stylesheet" href="/public/css/issues.css">
  <link rel="stylesheet" href="/public/css/codicon.css">
</head>
<body class="project-shell" data-dashboard-page="projects" data-project-view="knowledge">
  <div data-dashboard-sidebar></div>

  <header>
    <div class="breadcrumb" style="margin-left:12px">
      <a href="/projects">Projects</a> / <a id="project-name" href="#" style="color:var(--link);text-decoration:none">Loading...</a><span id="breadcrumb-section"></span>
    </div>
    <div class="header-right">
      <div id="ws-status-indicator" style="display:flex;align-items:center;padding-right:12px"></div>
    </div>
  </header>

  <main id="main-content" class="container">
    <div class="project-header mb-16">
      <div class="project-header-main">
        <div class="project-title-row">
          <h2 id="project-title">Project</h2>
          <span id="project-status" class="status-badge"></span>
          <span id="project-access-badge"></span>
        </div>
        <div class="project-access-row">
          <span class="meta-chip" id="project-access-summary"></span>
          <span class="meta-chip" id="project-owner-summary"></span>
          <span class="meta-chip meta-chip-remote meta-chip-remote-address" id="project-remote-summary" style="display:none"></span>
          <button class="btn btn-sm" id="btn-view-members" onclick="openProjectMembersModal(false)">Members</button>
          <a class="btn btn-sm" id="btn-open-ops-console" href="#" style="display:none;text-decoration:none">Operations Console</a>
          <button class="btn btn-sm btn-primary" id="btn-share-project" data-project-requires-manage onclick="openProjectMembersModal(true)" style="display:none">Share Settings</button>
        </div>
        <div class="project-inline-note" id="project-debug-note" style="display:none"></div>
        <div class="project-readonly-banner" id="project-readonly-banner" style="display:none"></div>
      </div>
      <div class="flex" id="project-manage-actions" data-project-requires-manage style="display:none">
        <button class="btn btn-sm" id="btn-toggle" onclick="toggleProjectStatus()">Pause</button>
        <button class="btn btn-sm btn-primary" id="btn-trigger" onclick="triggerController()">Trigger Controller</button>
        <button class="btn btn-sm btn-danger" id="btn-delete-project" data-project-requires-delete onclick="deleteProject()">Delete</button>
      </div>
    </div>

    <nav class="project-section-nav" aria-label="Project sections">
      <a href="#" data-project-section-link="overview">Overview</a>
      <a href="#" data-project-section-link="agents">Agents</a>
      <a href="#" data-project-section-link="issues">Issues</a>
      <a href="#" data-project-section-link="activity">Activity</a>
      <a href="#" data-project-section-link="git">Git</a>
      <a href="#" data-project-section-link="knowledge">Knowledge</a>
      <a href="#" data-project-section-link="files">Files</a>
      <a href="#" data-project-section-link="workflow">Workflow</a>
    </nav>

    <div id="tab-knowledge">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div style="display:flex;gap:8px;align-items:center">
          <select id="knowledge-filter-importance" onchange="loadKnowledge()" style="font-size:12px;padding:4px 8px">
            <option value="">All Importance</option>
            <option value="high">High (auto-inject)</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
        </div>
        <button class="btn btn-primary" id="btn-new-knowledge" onclick="showCreateKnowledgeModal()" style="display:none">+ Add Knowledge</button>
      </div>
      <div id="knowledge-list" class="card">
        <div class="empty-state">Loading...</div>
      </div>
    </div>

  <div class="modal-overlay" id="knowledgeModal">
    <div class="modal" style="max-width:600px">
      <h3 id="knowledge-modal-title">Add Knowledge Entry</h3>
      <input type="hidden" id="knowledge-edit-id">
      <div class="form-group">
        <label>Title</label>
        <input type="text" id="knowledge-title" placeholder="Knowledge entry title">
      </div>
      <div class="form-group">
        <label>Content</label>
        <textarea id="knowledge-content" rows="8" placeholder="Knowledge content (Markdown supported)..."></textarea>
      </div>
      <div class="form-group">
        <label>Tags (comma-separated)</label>
        <input type="text" id="knowledge-tags" placeholder="architecture, convention, api">
      </div>
      <div class="form-group">
        <label>Importance</label>
        <select id="knowledge-importance">
          <option value="high">High — auto-injected on agent start</option>
          <option value="medium" selected>Medium — queryable on demand</option>
          <option value="low">Low — reference</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn" onclick="hideModal('knowledgeModal')">Cancel</button>
        <button class="btn btn-primary" onclick="saveKnowledge()">Save</button>
      </div>
    </div>
  </div>

  </main>

  <div class="modal-overlay" id="projectMembersModal" onclick="if(event.target===this)hideModal('projectMembersModal')">
    <div class="modal project-members-modal">
      <div class="project-members-header">
        <div>
          <h3>Project Members &amp; Sharing</h3>
          <div class="project-inline-note" id="project-members-subtitle"></div>
        </div>
        <button class="drawer-close" type="button" onclick="hideModal('projectMembersModal')">&times;</button>
      </div>
      <div class="project-readonly-banner" id="project-members-readonly-note" style="display:none"></div>
      <div class="project-inline-note" id="project-members-debug-hint" style="display:none"></div>
      <div id="project-members-manage-panel">
        <div class="project-share-form">
          <div class="form-group" style="margin-bottom:0">
            <label for="project-share-username">Add Member</label>
            <input type="text" id="project-share-username" placeholder="Enter username, e.g. alice" onkeydown="if(event.key==='Enter'&&!event.isComposing){event.preventDefault();addProjectMember()}">
          </div>
          <select id="project-share-role" style="padding:6px 8px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--fg);font-size:13px;">
            <option value="member">Read Only</option>
            <option value="editor" selected>Editor</option>
            <option value="owner">Owner</option>
          </select>
          <button class="btn btn-primary" id="btn-add-member" onclick="addProjectMember()">Grant Access</button>
        </div>
      </div>
      <div id="project-members-list" class="project-members-list">
        <div class="empty-state">Loading members...</div>
      </div>
    </div>
  </div>


  <template id="tmpl-knowledge-list">
    <div style="padding:8px 0" data-slot="entries"></div>
  </template>

  <template id="tmpl-knowledge-entry">
    <div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start">
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
          <span data-slot="importance" style="padding:1px 6px;border-radius:3px;font-size:10px;color:#fff"></span>
          <span data-slot="title" style="font-weight:600;font-size:13px"></span>
        </div>
        <div data-slot="content" style="font-size:12px;color:var(--text-secondary);margin-bottom:4px;max-height:60px;overflow:hidden;white-space:pre-wrap"></div>
        <div data-slot="tags" style="display:flex;gap:4px;flex-wrap:wrap"></div>
      </div>
      <div data-slot="actions" style="display:flex;gap:4px;flex-shrink:0;margin-left:12px">
        <button type="button" class="btn btn-sm" data-action="edit-knowledge" style="padding:3px 8px">Edit</button>
        <button type="button" class="btn btn-sm" data-action="delete-knowledge" style="padding:3px 8px;color:var(--error)">Delete</button>
      </div>
    </div>
  </template>


  <script src="/public/vendor/marked.js"></script>
  <script src="/public/vendor/katex/katex.min.js?v=0.16.11"></script>
  <script src="/public/js/components/dashboard-sidebar.js?v=1"></script>
  <script src="/public/js/shared/ws-client.js?v=1"></script>
  <script src="/public/js/shared/common.js?v=4"></script>
  <script src="/public/js/shared/command-profiles.js?v=3"></script>

  <script src="/public/js/pages/project/shell.js?v=1"></script>
  <script src="/public/js/pages/project/members.js?v=2"></script>
  <script src="/public/js/pages/project/knowledge.js?v=1"></script>
</body>
</html>
