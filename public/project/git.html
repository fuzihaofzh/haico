<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HAICO - Project</title>
  <link rel="icon" type="image/svg+xml" href="/public/brand/haico-mark.svg">
  <link rel="icon" type="image/x-icon" href="/public/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/public/favicon-32.png">
  <link rel="apple-touch-icon" href="/public/apple-touch-icon.png">
  <script src="/public/js/shared/theme.js"></script>
  <link rel="stylesheet" href="/public/css/style.css">
  <link rel="stylesheet" href="/public/css/issues.css">
  <link rel="stylesheet" href="/public/css/codicon.css">
</head>
<body class="project-shell" data-dashboard-page="projects" data-project-view="git">
  <div data-dashboard-sidebar>
    <nav class="vertical-sidebar dashboard-sidebar-skeleton" aria-hidden="true">
      <span class="sidebar-logo sidebar-skeleton-logo"></span>
      <span class="sidebar-nav-item sidebar-skeleton-item"><span class="sidebar-skeleton-icon"></span><span class="sidebar-skeleton-label"></span></span>
      <span class="sidebar-nav-item sidebar-skeleton-item"><span class="sidebar-skeleton-icon"></span><span class="sidebar-skeleton-label"></span></span>
      <span class="sidebar-nav-item sidebar-skeleton-item"><span class="sidebar-skeleton-icon"></span><span class="sidebar-skeleton-label"></span></span>
      <span class="sidebar-nav-item sidebar-nav-settings sidebar-skeleton-item"><span class="sidebar-skeleton-icon"></span><span class="sidebar-skeleton-label"></span></span>
    </nav>
  </div>

  <header>
    <div class="breadcrumb" style="margin-left:12px">
      <a href="/projects">Projects</a> / <a id="project-name" href="#" style="color:var(--link);text-decoration:none">Loading...</a><span id="breadcrumb-section"></span>
    </div>
    <div class="header-right">
      <div id="ws-status-indicator" style="display:flex;align-items:center;padding-right:12px"></div>
      <span class="header-user-skeleton" aria-hidden="true">
        <span class="header-skeleton-sound"></span>
        <span class="header-skeleton-avatar"></span>
      </span>
    </div>
  </header>

  <main id="main-content" class="container">
    <div class="project-header mb-16">
      <div class="project-header-main">
        <div class="project-title-row">
          <h2 id="project-title">Project</h2>
          <span id="project-status" class="status-badge"></span>
          <span id="project-access-badge"></span>
        </div>
        <div class="project-access-row">
          <span class="meta-chip" id="project-access-summary"></span>
          <span class="meta-chip" id="project-owner-summary"></span>
          <span class="meta-chip meta-chip-remote meta-chip-remote-address" id="project-remote-summary" style="display:none"></span>
          <a class="btn btn-sm" id="btn-view-members" href="#" style="text-decoration:none">Members</a>
          <a class="btn btn-sm" id="btn-open-ops-console" href="#" style="display:none;text-decoration:none">Operations Console</a>
        </div>
        <div class="project-inline-note" id="project-debug-note" style="display:none"></div>
        <div class="project-readonly-banner" id="project-readonly-banner" style="display:none"></div>
      </div>
      <div class="flex" id="project-manage-actions" data-project-requires-manage style="display:none">
        <button class="btn btn-sm" id="btn-toggle" onclick="toggleProjectStatus()">Pause</button>
        <button class="btn btn-sm btn-primary" id="btn-trigger" onclick="triggerController()">Trigger Controller</button>
        <button class="btn btn-sm btn-danger" id="btn-delete-project" data-project-requires-delete onclick="deleteProject()">Delete</button>
      </div>
    </div>

    <nav class="project-section-nav" aria-label="Project sections">
      <a href="#" data-project-section-link="overview">Overview</a>
      <a href="#" data-project-section-link="agents">Agents</a>
      <a href="#" data-project-section-link="issues">Issues</a>
      <a href="#" data-project-section-link="activity">Activity</a>
      <a href="#" data-project-section-link="git">Git</a>
      <a href="#" data-project-section-link="knowledge">Knowledge</a>
      <a href="#" data-project-section-link="files">Files</a>
      <a href="#" data-project-section-link="workflow">Workflow</a>
      <a href="#" data-project-section-link="sharing">Sharing</a>
    </nav>

    <div id="tab-git">
      <div id="git-status-summary" style="margin-bottom:16px"></div>
      <div class="card" id="git-commit-list">
        <div class="empty-state">Loading git information...</div>
      </div>
      <div id="git-uncommitted" style="margin-top:16px"></div>
    </div>

  </main>

  <template id="tmpl-git-status-summary">
    <div class="card" style="padding:14px 18px">
      <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;opacity:0.6;margin-bottom:10px">Repository Status</div>
      <div data-slot="rows"></div>
    </div>
  </template>

  <template id="tmpl-git-status-row">
    <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;flex-wrap:wrap">
      <div data-slot="avatar" style="flex-shrink:0"></div>
      <strong data-slot="agent-name"></strong>
      <span data-slot="branch" style="background:var(--bg);padding:2px 8px;border-radius:10px;border:1px solid var(--border);font-family:monospace;font-size:11px"></span>
      <div data-slot="last-commit" style="flex:1">
        <code data-slot="commit-hash" style="color:var(--accent)"></code>
        <span data-slot="commit-message"></span>
        <span data-slot="commit-time" style="color:var(--text-secondary)"></span>
        <span data-slot="no-commits" style="color:var(--text-secondary)">no commits</span>
      </div>
      <span data-slot="uncommitted" style="color:var(--warning);margin-left:12px"></span>
    </div>
  </template>

  <template id="tmpl-git-commit-list">
    <div>
      <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;opacity:0.6;margin-bottom:10px;padding:0 4px">Recent Commits</div>
      <div data-slot="rows"></div>
    </div>
  </template>

  <template id="tmpl-git-commit-row">
    <div style="display:flex;gap:10px;padding:8px 4px;border-bottom:1px solid var(--border);font-size:13px;align-items:flex-start">
      <span style="color:var(--success);flex-shrink:0;margin-top:2px">●</span>
      <code data-slot="short-hash" style="color:var(--accent);flex-shrink:0;font-size:12px"></code>
      <div style="flex:1;min-width:0">
        <div data-slot="message" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis"></div>
        <div style="font-size:11px;color:var(--text-secondary);margin-top:2px"><span data-slot="author"></span> <span data-slot="time" style="color:var(--text-secondary)"></span></div>
      </div>
    </div>
  </template>

  <template id="tmpl-git-uncommitted">
    <div class="card" style="padding:14px 18px">
      <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;opacity:0.6;margin-bottom:10px">Uncommitted Changes</div>
      <div data-slot="rows"></div>
    </div>
  </template>

  <template id="tmpl-git-uncommitted-row">
    <div style="display:flex;gap:8px;padding:4px 0;font-size:12px;font-family:monospace;border-bottom:1px solid var(--border)">
      <span data-slot="status" style="width:20px;text-align:center;flex-shrink:0"></span>
      <span data-slot="file"></span>
    </div>
  </template>


  <script src="/public/vendor/marked.js"></script>
  <script src="/public/vendor/katex/katex.min.js?v=0.16.11"></script>
  <script src="/public/js/shared/common.js"></script>
  <script type="module" src="/public/js/components/toast.js"></script>
  <script type="module" src="/public/js/components/confirm.js"></script>
  <script src="/public/js/components/dashboard-sidebar.js"></script>
  <script src="/public/js/shared/ws-client.js"></script>
  <script src="/public/js/shared/command-profiles.js"></script>

  <script src="/public/js/pages/project/shell.js"></script>
  <script src="/public/js/pages/project/git.js"></script>
</body>
</html>
