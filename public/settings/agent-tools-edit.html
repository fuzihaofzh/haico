<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Agent Tool - HAICO</title>
  <link rel="icon" type="image/svg+xml" href="/public/brand/haico-mark.svg">
  <link rel="icon" type="image/x-icon" href="/public/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/public/favicon-32.png">
  <link rel="apple-touch-icon" href="/public/apple-touch-icon.png">
  <script src="/public/js/shared/theme.js"></script>
  <link rel="stylesheet" href="/public/css/index.css">
</head>
<body class="dashboard-shell" data-dashboard-page="settings">
  <div data-dashboard-sidebar>
    <nav class="vertical-sidebar dashboard-sidebar-skeleton" aria-hidden="true">
      <span class="sidebar-logo sidebar-skeleton-logo"></span>
      <span class="sidebar-nav-item sidebar-skeleton-item"><span class="sidebar-skeleton-icon"></span><span class="sidebar-skeleton-label"></span></span>
      <span class="sidebar-nav-item sidebar-skeleton-item"><span class="sidebar-skeleton-icon"></span><span class="sidebar-skeleton-label"></span></span>
      <span class="sidebar-nav-item sidebar-skeleton-item"><span class="sidebar-skeleton-icon"></span><span class="sidebar-skeleton-label"></span></span>
      <span class="sidebar-nav-item sidebar-nav-settings sidebar-skeleton-item"><span class="sidebar-skeleton-icon"></span><span class="sidebar-skeleton-label"></span></span>
    </nav>
  </div>

  <header>
    <div class="header-right">
      <a class="btn btn-primary btn-sm" href="/projects/new">+ New Project</a>
      <span class="header-user-skeleton" aria-hidden="true">
        <span class="header-skeleton-sound"></span>
        <span class="header-skeleton-avatar"></span>
      </span>
    </div>
  </header>

  <main id="main-content" class="container">
    <div id="settings-view-panel" class="dashboard-view dashboard-view-settings">
      <div class="settings-page-header">
        <div>
          <div class="settings-page-eyebrow">Workspace <span class="breadcrumb-sep">/</span> Agent Tools <span class="breadcrumb-sep">/</span> Edit</div>
          <h2>Edit Agent Tool</h2>
        </div>
      </div>

      <nav class="settings-section-nav" aria-label="Settings sections">
        <a href="/settings">General</a>
        <a href="/settings/agent-tools" aria-current="page">Agent Tools</a>
      </nav>

      <section class="agent-tools-panel settings-card-wide">
        <div class="settings-card-header">
          <div class="settings-card-header-start">
            <a class="btn btn-sm settings-card-back-btn" href="/settings/agent-tools" aria-label="Back to Agent Tools">&larr;</a>
            <div>
              <h3>Edit Agent Tool</h3>
              <p>Update the command and configuration for this Agent Tool.</p>
            </div>
          </div>
        </div>
        <div class="settings-section settings-section-page">
          <div class="command-profiles-status" data-agent-tools-loading>Loading Agent Tool...</div>
          <div class="command-profiles-status command-profiles-status-error" data-agent-tools-error hidden></div>
          <div data-agent-tools-form class="command-profile-form-grid command-profile-form-grid-standalone">
            <label class="command-profile-form-field">Agent Tool
              <input type="text" class="command-profile-input" data-field="name" placeholder="New profile">
            </label>
            <label class="command-profile-form-field">Scenario
              <input type="text" class="command-profile-input" data-field="scenario" placeholder="Daily development">
            </label>
            <label class="command-profile-form-field command-profile-form-command">Command
              <input type="text" class="command-profile-input command-profile-command" data-field="command" placeholder="cld --model claude-sonnet-4-6">
            </label>
            <label class="command-profile-form-field">Type
              <select class="command-profile-select" data-field="type"></select>
            </label>
            <div class="command-profile-form-field command-profile-form-config">
              <span>Config</span>
              <div class="command-profile-config" data-command-profile-config></div>
            </div>
            <div class="command-profile-form-actions">
              <button type="button" class="btn btn-primary btn-sm" data-agent-tools-action="save">Save</button>
              <button type="button" class="btn btn-sm btn-danger" data-agent-tools-action="delete">Delete</button>
            </div>
          </div>
        </div>
      </section>
    </div>
  </main>
  <script src="/public/js/shared/common.js"></script>
  <script src="/public/js/components/dashboard-sidebar.js"></script>
  <script src="/public/js/shared/command-profiles.js"></script>
  <script type="module" src="/public/js/pages/settings/agent-tools-edit.js"></script>
</body>
</html>
