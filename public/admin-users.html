<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Users - HAICO</title>
  <link rel="icon" type="image/svg+xml" href="/public/brand/haico-mark.svg">
  <link rel="icon" type="image/x-icon" href="/public/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/public/favicon-32.png">
  <link rel="apple-touch-icon" href="/public/apple-touch-icon.png">
  <script src="/public/js/shared/theme.js"></script>
  <link rel="stylesheet" href="/public/css/style.css">
</head>
<body class="dashboard-shell" data-dashboard-page="admin">
  <div data-dashboard-sidebar>
    <nav class="vertical-sidebar dashboard-sidebar-skeleton" aria-hidden="true">
      <span class="sidebar-logo sidebar-skeleton-logo"></span>
      <span class="sidebar-nav-item sidebar-skeleton-item"><span class="sidebar-skeleton-icon"></span><span class="sidebar-skeleton-label"></span></span>
      <span class="sidebar-nav-item sidebar-skeleton-item"><span class="sidebar-skeleton-icon"></span><span class="sidebar-skeleton-label"></span></span>
      <span class="sidebar-nav-item sidebar-skeleton-item"><span class="sidebar-skeleton-icon"></span><span class="sidebar-skeleton-label"></span></span>
      <span class="sidebar-nav-item sidebar-nav-settings sidebar-skeleton-item"><span class="sidebar-skeleton-icon"></span><span class="sidebar-skeleton-label"></span></span>
    </nav>
  </div>

  <header>
    <div class="header-right">
      <span class="header-user-skeleton" aria-hidden="true">
        <span class="header-skeleton-sound"></span>
        <span class="header-skeleton-avatar"></span>
      </span>
    </div>
  </header>

  <main id="main-content" class="container">
    <div id="admin-view-panel" class="dashboard-view dashboard-view-admin">
      <div class="settings-page-header">
        <div>
          <div class="settings-page-eyebrow">Administration</div>
          <h2>Admin</h2>
          <p>Manage users, global settings, and system operations.</p>
        </div>
      </div>

      <nav class="settings-section-nav" aria-label="Admin sections">
        <a href="/admin/users" class="active" aria-current="page">Users</a>
        <a href="/admin/global-settings">Global Settings</a>
        <a href="/admin/system">System</a>
      </nav>

      <div class="admin-page-bar">
        <h3>Users</h3>
        <button class="btn btn-primary btn-sm" id="add-user-btn">+ Add User</button>
      </div>
      <div id="users-list">
        <div class="empty-state">Loading users...</div>
      </div>
      <div id="error-msg" style="color:var(--error);margin-top:8px;font-size:13px;display:none"></div>
    </div>
  </main>

  <!-- Add User Modal -->
  <div id="add-user-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center">
    <div style="background:var(--header-bg);border:1px solid var(--border);border-radius:12px;padding:24px;width:100%;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,0.3)">
      <h3 style="margin:0 0 16px">Add User</h3>
      <form id="add-user-form" style="display:flex;flex-direction:column;gap:12px">
        <label style="font-size:13px">Username<input id="new-username" style="display:block;width:100%;padding:6px 8px;margin-top:4px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--fg);font-size:14px;font-family:inherit;box-sizing:border-box"></label>
        <label style="font-size:13px">Display Name<input id="new-display-name" style="display:block;width:100%;padding:6px 8px;margin-top:4px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--fg);font-size:14px;font-family:inherit;box-sizing:border-box"></label>
        <label style="font-size:13px">Password<input id="new-password" type="password" style="display:block;width:100%;padding:6px 8px;margin-top:4px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--fg);font-size:14px;font-family:inherit;box-sizing:border-box"></label>
        <label style="font-size:13px">Role
          <select id="new-role" style="display:block;width:100%;padding:6px 8px;margin-top:4px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--fg);font-size:14px;font-family:inherit">
            <option value="member">member</option>
            <option value="admin">admin</option>
          </select>
        </label>
        <div id="add-user-error" style="color:var(--error);font-size:13px;display:none"></div>
        <div style="display:flex;justify-content:flex-end;gap:8px">
          <button type="button" class="btn btn-sm" id="add-user-cancel-btn">Cancel</button>
          <button type="submit" class="btn btn-primary btn-sm" id="add-user-submit">Add User</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Reset Password Modal -->
  <div id="reset-password-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center">
    <div style="background:var(--header-bg);border:1px solid var(--border);border-radius:12px;padding:24px;width:100%;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,0.3)">
      <h3 style="margin:0 0 16px">Reset Password</h3>
      <form id="reset-password-form">
        <div id="reset-password-username" style="font-size:14px;margin-bottom:12px"></div>
        <input type="hidden" id="reset-password-user-id">
        <label style="font-size:13px">New Password<input id="reset-password-new" type="password" style="display:block;width:100%;padding:6px 8px;margin-top:4px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--fg);font-size:14px;font-family:inherit;box-sizing:border-box"></label>
        <div id="reset-password-error" style="color:var(--error);margin-top:8px;font-size:13px;display:none"></div>
        <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:16px">
          <button type="button" class="btn btn-sm" id="reset-password-cancel-btn">Cancel</button>
          <button type="submit" class="btn btn-primary btn-sm" id="reset-password-submit">Reset</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/public/js/shared/common.js"></script>
  <script src="/public/js/components/dashboard-sidebar.js"></script>
  <script type="module" src="/public/js/pages/admin/users-tab.js"></script>
</body>
</html>
