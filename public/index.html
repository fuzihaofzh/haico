<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Argus - Multi-Agent Platform</title>
  <link rel="stylesheet" href="/public/css/style.css">
  <link rel="stylesheet" href="/public/css/issues.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
</head>
<body>
  <!-- Overlay -->
  <div class="overlay" id="overlay" onclick="closeDrawer()"></div>

  <!-- Drawer -->
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <h3><span style="color:var(--accent)">Argus</span></h3>
      <button class="drawer-close" onclick="closeDrawer()">&times;</button>
    </div>
    <div class="drawer-content">
      <div class="drawer-section">
        <div class="drawer-section-header">Navigation</div>
        <a href="/" class="drawer-link">Dashboard</a>
      </div>
      <div class="drawer-section">
        <div class="drawer-section-header">Settings</div>
        <div class="settings-section">
          <div class="setting-group">
            <label>Theme</label>
            <select id="theme-select" onchange="changeTheme(this.value)">
              <option value="github-dark">GitHub Dark</option>
              <option value="dracula">Dracula</option>
              <option value="nord-dark">Nord Dark</option>
              <option value="nord-light">Nord Light</option>
              <option value="monokai">Monokai</option>
              <option value="solarized-dark">Solarized Dark</option>
              <option value="solarized-light">Solarized Light</option>
            </select>
          </div>
          <div class="setting-group">
            <label class="toggle-label">
              Notification Sound
              <button type="button" class="toggle-switch notif-sound-toggle" onclick="toggleNotificationSound()">
                <span class="toggle-knob"></span>
              </button>
            </label>
          </div>
        </div>
      </div>
      <div class="drawer-section">
        <a href="/change-password" class="drawer-link">Change Password</a>
        <a href="#" class="drawer-link" onclick="logout();return false" style="color:var(--error)">Logout</a>
      </div>
    </div>
  </div>

  <!-- Header -->
  <header>
    <button class="menu-btn" onclick="toggleDrawer()">
      <span></span><span></span><span></span>
    </button>
    <h1><a href="/" style="color:var(--accent);text-decoration:none">Argus</a></h1>
    <div class="header-right">
      <button class="btn btn-primary btn-sm" onclick="showCreateModal()">+ New Project</button>
    </div>
  </header>

  <div class="container">
    <!-- Aggregate Stats -->
    <div id="dashboard-stats" class="dashboard-stats" style="display:none">
      <div class="stat-card">
        <div class="stat-value" id="stat-running">0</div>
        <div class="stat-label">Running Agents</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-open-issues">0</div>
        <div class="stat-label">Open Issues</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-cost">$0.00</div>
        <div class="stat-label">Total Cost</div>
      </div>
      <div class="stat-card stat-card-errors" id="stat-errors-card" style="display:none">
        <div class="stat-value" id="stat-errors" style="color:var(--error)">0</div>
        <div class="stat-label">Agent Errors</div>
      </div>
    </div>

    <!-- Inbox Panel -->
    <div id="notifications-panel" class="notifications-panel" style="display:none">
      <div class="notifications-header">
        <span onclick="toggleNotifications()" style="cursor:pointer;flex:1;display:flex;align-items:center;gap:6px">
          <span>Inbox</span>
          <span class="notif-badge" id="notif-count" style="display:none">0</span>
        </span>
        <span class="notif-filter-group" id="notif-filter-group">
          <button class="notif-filter-btn active" data-filter="all" onclick="event.stopPropagation();toggleNotifFilter('all')">All</button>
          <button class="notif-filter-btn" data-filter="action" onclick="event.stopPropagation();toggleNotifFilter('action')">Action required</button>
          <button class="notif-filter-btn" data-filter="my" onclick="event.stopPropagation();toggleNotifFilter('my')">My Issues</button>
        </span>
        <span class="notif-toggle" id="notif-toggle-icon" onclick="toggleNotifications()" style="cursor:pointer">&#9660;</span>
      </div>
      <div class="inbox-search-bar">
        <input type="text" id="inbox-search" class="inbox-search-input" placeholder="搜索 issue..." oninput="filterInbox(this.value)">
      </div>
      <div class="notifications-body" id="notifications-body"></div>
    </div>

    <div id="projects" class="grid">
      <div class="empty-state">Loading projects...</div>
    </div>

    <!-- Usage by Project Chart -->
    <div id="usage-by-project-panel" class="card" style="display:none;margin-bottom:16px;padding:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <strong style="font-size:14px">Usage by Project</strong>
        <div style="display:flex;gap:4px">
          <button class="btn btn-sm usage-period-btn" data-period="hour" onclick="switchUsagePeriod('hour')">Hour</button>
          <button class="btn btn-sm usage-period-btn active" data-period="day" onclick="switchUsagePeriod('day')">Day</button>
          <button class="btn btn-sm usage-period-btn" data-period="week" onclick="switchUsagePeriod('week')">Week</button>
        </div>
      </div>
      <div id="usage-by-project-chart"></div>
    </div>
  </div>

  <!-- Issue Detail Floating Panel -->
  <div class="modal-overlay" id="issueDetailModal" onclick="if(event.target===this)closeIssuePanel()">
    <div class="modal issue-panel-modal" style="max-width:800px;width:80vw;max-height:85vh;overflow-y:auto;position:relative">
      <button onclick="closeIssuePanel()" style="position:absolute;top:12px;right:12px;background:none;border:none;color:var(--text-secondary);cursor:pointer;font-size:18px;line-height:1">&times;</button>
      <div id="issueDetailContent"><div style="padding:20px;text-align:center;color:var(--text-secondary)">Loading...</div></div>
    </div>
  </div>

  <!-- Create Project Modal -->
  <div class="modal-overlay" id="createModal">
    <div class="modal">
      <h3>Create New Project</h3>
      <div class="form-group">
        <label>What do you want to do?</label>
        <textarea id="proj-task" rows="4" placeholder="Describe your task... The system will create a name and configure everything automatically."></textarea>
      </div>
      <div class="form-group">
        <label>Tool Path</label>
        <input type="text" id="proj-cmd" value="cld" style="font-family:monospace;font-size:13px" placeholder="claude">
        <div style="font-size:11px;color:var(--text-secondary);margin-top:4px">
          Path to Claude CLI. Leave default unless you have a custom setup.
        </div>
      </div>
      <input type="hidden" id="proj-name" value="">
      <input type="hidden" id="proj-desc" value="">
      <div class="modal-actions">
        <button class="btn" onclick="hideCreateModal()">Cancel</button>
        <button class="btn btn-primary" onclick="createProject()">Create</button>
      </div>
    </div>
  </div>

  <script src="/public/vendor/marked.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script src="/public/js/common.js"></script>
  <script src="/public/js/issue-renderer.js"></script>
  <script src="/public/js/dashboard.js"></script>
</body>
</html>
