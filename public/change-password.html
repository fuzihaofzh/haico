<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HAICO - Change Password</title>
  <link rel="icon" type="image/svg+xml" href="/public/brand/haico-mark.svg">
  <link rel="icon" type="image/x-icon" href="/public/favicon.ico">
  <script src="/public/js/shared/theme.js"></script>
  <link rel="stylesheet" href="/public/css/auth.css">
  <script defer src="/public/vendor/htmx.min.js"></script>
  <script type="module" src="/public/js/pages/auth-pages.js"></script>
</head>
<body>
  <div class="card">
    <h1><span>HAICO</span></h1>
    <p class="subtitle">Change your password</p>
    <form id="change-password-form" class="auth-form" data-auth-action="change-password" hx-post="/api/auth/change-password" hx-swap="none">
      <label for="current">Current password</label>
      <input type="password" id="current" name="current" autofocus required>
      <label for="password">New password</label>
      <input type="password" id="password" name="password" placeholder="Min 4 characters" required>
      <label for="confirm">Confirm new password</label>
      <input type="password" id="confirm" name="confirm" required>
      <button type="submit">Change Password</button>
      <div class="error" id="error"></div>
      <div class="success" id="success">Password changed successfully</div>
    </form>
  </div>
</body>
</html>
