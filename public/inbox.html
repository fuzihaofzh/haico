<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inbox - HAICO</title>
  <link rel="icon" type="image/svg+xml" href="/public/brand/haico-mark.svg">
  <link rel="icon" type="image/x-icon" href="/public/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/public/favicon-32.png">
  <link rel="apple-touch-icon" href="/public/apple-touch-icon.png">
  <script src="/public/js/shared/theme.js"></script>
  <link rel="stylesheet" href="/public/css/index.css">
  <link rel="stylesheet" href="/public/vendor/katex/katex.min.css?v=0.16.11">
</head>
<body class="dashboard-shell" data-dashboard-page="inbox">
  <div data-dashboard-sidebar>
    <nav class="vertical-sidebar dashboard-sidebar-skeleton" aria-hidden="true">
      <span class="sidebar-logo sidebar-skeleton-logo"></span>
      <span class="sidebar-nav-item sidebar-skeleton-item"><span class="sidebar-skeleton-icon"></span><span class="sidebar-skeleton-label"></span></span>
      <span class="sidebar-nav-item sidebar-skeleton-item"><span class="sidebar-skeleton-icon"></span><span class="sidebar-skeleton-label"></span></span>
      <span class="sidebar-nav-item sidebar-skeleton-item"><span class="sidebar-skeleton-icon"></span><span class="sidebar-skeleton-label"></span></span>
      <span class="sidebar-nav-item sidebar-skeleton-item"><span class="sidebar-skeleton-icon"></span><span class="sidebar-skeleton-label"></span></span>
      <span class="sidebar-nav-item sidebar-skeleton-item"><span class="sidebar-skeleton-icon"></span><span class="sidebar-skeleton-label"></span></span>
      <span class="sidebar-nav-item sidebar-nav-settings sidebar-skeleton-item"><span class="sidebar-skeleton-icon"></span><span class="sidebar-skeleton-label"></span></span>
    </nav>
  </div>

  <header>
    <div class="header-right">
      <a class="btn btn-primary btn-sm" href="/compose">Compose</a>
      <a class="btn btn-primary btn-sm" href="/projects/new">+ New Project</a>
      <span class="header-user-skeleton" aria-hidden="true">
        <span class="header-skeleton-sound"></span>
        <span class="header-skeleton-avatar"></span>
      </span>
    </div>
  </header>

  <main id="main-content" class="container">
    <!-- Inbox Panel (Gmail-style) -->
    <div id="notifications-panel" class="mail-panel dashboard-view dashboard-view-inbox" style="display:none">
      <div class="mail-toolbar">
        <div class="mail-toolbar-left">
          <span class="mail-title">Inbox</span>
          <span class="notif-badge" id="notif-count" style="display:none">0</span>
        </div>
        <div class="mail-toolbar-center">
          <div class="notif-filter-group" role="group" aria-label="Inbox notification filters">
            <button class="notif-filter-btn active" data-action="notif-filter" data-filter="all" aria-pressed="true">All</button>
            <button class="notif-filter-btn" data-action="notif-filter" data-filter="action" aria-pressed="false">Action required</button>
            <button class="notif-filter-btn" data-action="notif-filter" data-filter="my" aria-pressed="false">My Issues</button>
          </div>
          <div class="inbox-scope-group" role="group" aria-label="Inbox issue scope">
            <button class="inbox-scope-btn active" data-action="inbox-scope" data-scope="user" aria-pressed="true">User Related</button>
            <button class="inbox-scope-btn" data-action="inbox-scope" data-scope="all" aria-pressed="false">All Issues</button>
          </div>
          <select id="inbox-project-filter" style="font-size:12px;background:var(--bg-secondary);color:var(--fg);border:1px solid var(--border);border-radius:4px;padding:2px 6px">
            <option value="">All Projects</option>
          </select>
        </div>
        <div class="mail-toolbar-right">
          <button class="btn btn-sm" data-action="toggle-notifications" id="notif-toggle-icon" title="Collapse/Expand">&#9660;</button>
        </div>
      </div>
      <div class="mail-body" id="mail-body">
        <div class="mail-search-bar">
          <input type="text" id="inbox-search" class="mail-search-input" placeholder="Search issues...">
        </div>
        <div class="mail-container">
          <div class="mail-list-pane" id="mail-list-pane">
            <div id="notifications-body" class="mail-list-items"></div>
          </div>
          <div class="mail-resizer" id="mail-resizer"></div>
          <div class="mail-detail-pane" id="mail-detail-pane">
            <div class="mail-detail-mobile-header">
              <button type="button" class="btn btn-sm mail-mobile-back-btn" data-action="show-inbox-list">&#8592; Back to list</button>
            </div>
            <div class="mail-detail-content-host" id="mail-detail-content">
              <div class="mail-detail-empty">
                <div class="mail-detail-empty-icon">&#9993;</div>
                <div>Select a message to read</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="/public/vendor/marked.js"></script>
  <script src="/public/vendor/katex/katex.min.js?v=0.16.11"></script>
  <script src="/public/js/shared/common.js"></script>
  <script type="module" src="/public/js/components/toast.js"></script>
  <script type="module" src="/public/js/components/confirm.js"></script>
  <script src="/public/js/components/dashboard-sidebar.js"></script>
  <script src="/public/js/shared/ws-client.js"></script>
  <script src="/public/js/components/issue-renderer.js"></script>
  <script type="module" src="/public/js/pages/dashboard-inbox.js"></script>
</body>
</html>
