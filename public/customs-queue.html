<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atlas Freight Command - Customs Document Review Queue</title>
  <link rel="icon" type="image/svg+xml" href="/public/brand/haico-mark.svg">
  <link rel="icon" type="image/x-icon" href="/public/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/public/favicon-32.png">
  <link rel="apple-touch-icon" href="/public/apple-touch-icon.png">
  <script src="/public/js/shared/theme.js"></script>
  <link rel="stylesheet" href="/public/css/style.css">
  <style>
    /* Customs Queue Layout */
    .customs-layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      grid-template-rows: auto 1fr;
      height: calc(100vh - 42px);
      overflow: hidden;
    }

    .customs-toolbar {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--header-bg);
      flex-wrap: wrap;
    }

    .customs-toolbar .toolbar-title {
      font-weight: 700;
      font-size: 13px;
      color: var(--fg);
      margin-right: 8px;
    }

    .customs-toolbar .queue-stats {
      display: flex;
      gap: 14px;
      font-size: 11px;
      color: var(--text-secondary);
      margin-right: auto;
    }

    .customs-toolbar .queue-stats .stat-num {
      font-weight: 700;
      color: var(--fg);
    }

    .customs-toolbar .stat-num.urgent { color: var(--error); }
    .customs-toolbar .stat-num.warning { color: var(--warning); }
    .customs-toolbar .stat-num.ok { color: var(--success); }

    .filter-group {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .filter-btn {
      font-family: inherit;
      font-size: 11px;
      padding: 3px 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover { border-color: var(--accent); color: var(--fg); }
    .filter-btn.active { background: color-mix(in srgb, var(--accent) 15%, transparent); border-color: var(--accent); color: var(--accent); font-weight: 600; }

    .search-input {
      font-family: inherit;
      font-size: 11px;
      padding: 4px 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg);
      color: var(--fg);
      width: 180px;
      outline: none;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--text-secondary); }

    /* Queue List (left pane) */
    .queue-list-pane {
      border-right: 1px solid var(--border);
      overflow-y: auto;
      background: var(--bg);
    }

    .queue-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
      position: relative;
    }

    .queue-item:hover { background: var(--selected-bg); }
    .queue-item.selected { background: color-mix(in srgb, var(--accent) 10%, transparent); border-left: 3px solid var(--accent); padding-left: 11px; }

    .queue-item-header {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .queue-item-ref {
      font-size: 12px;
      font-weight: 700;
      color: var(--fg);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .queue-item-type {
      font-size: 9px;
      font-weight: 600;
      padding: 1px 5px;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }

    .type-bol { background: color-mix(in srgb, #6366f1 18%, transparent); color: #6366f1; }
    .type-ci { background: color-mix(in srgb, #06b6d4 18%, transparent); color: #06b6d4; }
    .type-co { background: color-mix(in srgb, #8b5cf6 18%, transparent); color: #8b5cf6; }
    .type-pl { background: color-mix(in srgb, #f59e0b 18%, transparent); color: #f59e0b; }
    .type-isc { background: color-mix(in srgb, #10b981 18%, transparent); color: #10b981; }
    .type-sad { background: color-mix(in srgb, #ef4444 18%, transparent); color: #ef4444; }

    .queue-item-route {
      font-size: 11px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .queue-item-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 10px;
      color: var(--text-secondary);
    }

    .priority-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .priority-critical { background: var(--error); box-shadow: 0 0 4px var(--error); }
    .priority-high { background: var(--warning); }
    .priority-normal { background: var(--text-secondary); }
    .priority-low { background: var(--border); }

    .sla-badge {
      font-size: 9px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 3px;
    }
    .sla-overdue { background: color-mix(in srgb, var(--error) 18%, transparent); color: var(--error); }
    .sla-urgent { background: color-mix(in srgb, var(--warning) 18%, transparent); color: var(--warning); }
    .sla-ok { background: color-mix(in srgb, var(--success) 12%, transparent); color: var(--success); }

    .queue-empty {
      padding: 40px 14px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 12px;
    }

    /* Detail Pane (right) */
    .detail-pane {
      overflow-y: auto;
      padding: 20px 24px;
      background: var(--bg);
    }

    .detail-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-secondary);
      font-size: 12px;
    }

    .detail-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .detail-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--fg);
    }

    .detail-subtitle {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .detail-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .btn-action {
      font-family: inherit;
      font-size: 11px;
      padding: 5px 12px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg);
      color: var(--fg);
      cursor: pointer;
      transition: all 0.15s;
      font-weight: 600;
    }
    .btn-action:hover { border-color: var(--accent); }
    .btn-approve { background: color-mix(in srgb, var(--success) 15%, transparent); border-color: var(--success); color: var(--success); }
    .btn-approve:hover { background: color-mix(in srgb, var(--success) 25%, transparent); }
    .btn-reject { background: color-mix(in srgb, var(--error) 12%, transparent); border-color: var(--error); color: var(--error); }
    .btn-reject:hover { background: color-mix(in srgb, var(--error) 22%, transparent); }
    .btn-hold { background: color-mix(in srgb, var(--warning) 12%, transparent); border-color: var(--warning); color: var(--warning); }
    .btn-hold:hover { background: color-mix(in srgb, var(--warning) 22%, transparent); }

    /* Detail Sections */
    .detail-section {
      margin-bottom: 16px;
    }

    .detail-section-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-secondary);
      margin-bottom: 8px;
      padding-bottom: 4px;
      border-bottom: 1px solid var(--border);
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 4px 10px;
      font-size: 11px;
    }

    .detail-label {
      color: var(--text-secondary);
      font-weight: 600;
    }

    .detail-value {
      color: var(--fg);
    }

    /* Document Checklist */
    .doc-checklist {
      list-style: none;
      font-size: 11px;
    }

    .doc-checklist li {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 0;
      border-bottom: 1px solid color-mix(in srgb, var(--border) 50%, transparent);
    }

    .doc-checklist li:last-child { border-bottom: none; }

    .doc-status-icon {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .doc-ok { background: color-mix(in srgb, var(--success) 20%, transparent); color: var(--success); }
    .doc-missing { background: color-mix(in srgb, var(--error) 20%, transparent); color: var(--error); }
    .doc-pending { background: color-mix(in srgb, var(--warning) 20%, transparent); color: var(--warning); }

    .doc-name { flex: 1; }
    .doc-note { font-size: 10px; color: var(--text-secondary); }

    /* Compliance Flags */
    .flag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .flag-tag {
      font-size: 9px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .flag-error { background: color-mix(in srgb, var(--error) 16%, transparent); color: var(--error); }
    .flag-warning { background: color-mix(in srgb, var(--warning) 16%, transparent); color: var(--warning); }
    .flag-info { background: color-mix(in srgb, var(--accent) 14%, transparent); color: var(--accent); }

    /* Timeline */
    .timeline {
      font-size: 11px;
    }

    .timeline-entry {
      display: flex;
      gap: 8px;
      padding: 5px 0;
      border-bottom: 1px solid color-mix(in srgb, var(--border) 40%, transparent);
    }

    .timeline-entry:last-child { border-bottom: none; }

    .timeline-time {
      flex-shrink: 0;
      width: 70px;
      color: var(--text-secondary);
      font-size: 10px;
    }

    .timeline-text { color: var(--fg); }

    /* Notes textarea */
    .review-notes {
      width: 100%;
      min-height: 60px;
      font-family: inherit;
      font-size: 11px;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg);
      color: var(--fg);
      resize: vertical;
      outline: none;
    }
    .review-notes:focus { border-color: var(--accent); }
    .review-notes::placeholder { color: var(--text-secondary); }

    /* Status badge in detail */
    .status-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 3px;
      text-transform: uppercase;
    }
    .status-pending-review { background: color-mix(in srgb, var(--warning) 18%, transparent); color: var(--warning); }
    .status-approved { background: color-mix(in srgb, var(--success) 18%, transparent); color: var(--success); }
    .status-rejected { background: color-mix(in srgb, var(--error) 18%, transparent); color: var(--error); }
    .status-on-hold { background: color-mix(in srgb, var(--text-secondary) 18%, transparent); color: var(--text-secondary); }

    /* Responsive */
    @media (max-width: 768px) {
      .customs-layout {
        grid-template-columns: 1fr;
      }
      .detail-pane { display: none; }
      .detail-pane.mobile-show { display: block; position: fixed; top: 42px; left: 56px; right: 0; bottom: 0; z-index: 100; }
      .queue-list-pane.mobile-hide { display: none; }
      .mobile-back-btn { display: inline-flex !important; }
    }

    .mobile-back-btn { display: none; font-family: inherit; font-size: 11px; padding: 3px 8px; border: 1px solid var(--border); border-radius: 4px; background: var(--bg); color: var(--fg); cursor: pointer; margin-bottom: 8px; }

</head>

  <!-- Main Layout -->

    <div class="customs-toolbar">
      <span class="toolbar-title">Customs Review Queue</span>

        <span><span class="stat-num" id="stat-total">0</span> total</span>
        <span><span class="stat-num urgent" id="stat-overdue">0</span> overdue</span>
        <span><span class="stat-num warning" id="stat-pending">0</span> pending</span>
        <span><span class="stat-num ok" id="stat-cleared">0</span> cleared</span>

      <div class="filter-group">

        <button class="filter-btn" data-filter="on_hold" onclick="setFilter('on_hold')">On Hold</button>

        <button class="filter-btn" data-filter="rejected" onclick="setFilter('rejected')">Rejected</button>

      <div class="detail-empty" id="detail-empty">Select a shipment to review</div>

        weight: '18,600 kg',
        value: '\u20ac245,000',
        hsCode: '2204.21 \u2014 Wine of fresh grapes',
        priority: 'normal',
        status: 'pending_review',
        slaDeadline: '2026-04-12T09:00:00Z',
        submittedAt: '2026-04-10T13:00:00Z',
        documents: [
          { name: 'Bill of Lading (Original)', status: 'ok', note: '' },

          { name: 'Phytosanitary Certificate', status: 'ok', note: '' },
        ],
        flags: [
          { level: 'warning', text: 'Excise doc pending \u2014 HMRC clearance required' },
          { level: 'info', text: 'Post-Brexit TCA rules apply' },
        ],
        timeline: [
          { time: '04-10 13:00', text: 'Documents submitted' },
          { time: '04-10 13:02', text: 'Auto-validation: 5/6 docs passed' },
          { time: '04-10 15:00', text: 'Queued for customs review' },
        ],
        notes: '',
      },
    ];

    // --- State ---
    let currentFilter = 'all';
    let selectedId = null;

    // --- Rendering ---
    function renderList() {
      const search = document.getElementById('search-input').value.toLowerCase();
      const filtered = SHIPMENTS.filter(s => {
        if (currentFilter !== 'all' && s.status !== currentFilter) return false;
        if (search) {
          const hay = [s.id, s.shipper, s.consignee, s.origin, s.destination, s.route, s.carrier, s.hsCode].join(' ').toLowerCase();
          if (!hay.includes(search)) return false;
        }
        return true;
      });

      // Sort: critical first, then by SLA
      filtered.sort((a, b) => {
        const pOrd = { critical: 0, high: 1, normal: 2, low: 3 };
        if (pOrd[a.priority] !== pOrd[b.priority]) return pOrd[a.priority] - pOrd[b.priority];
        return new Date(a.slaDeadline) - new Date(b.slaDeadline);
      });

      const list = document.getElementById('queue-list');
      if (filtered.length === 0) {
        list.innerHTML = '<div class="queue-empty">No shipments match the current filter</div>';
      } else {
        list.innerHTML = filtered.map(s => {
          const typeClass = 'type-' + s.type.toLowerCase();
          const sla = getSLAInfo(s);
          return `<div class="queue-item ${s.id === selectedId ? 'selected' : ''}" onclick="selectItem('${s.id}')">
            <div class="queue-item-header">
              <span class="priority-dot priority-${s.priority}"></span>
              <span class="queue-item-ref">${s.id}</span>
              <span class="queue-item-type ${typeClass}">${s.type}</span>
              ${sla.html}
            </div>
            <div class="queue-item-route">${s.shipper} &mdash; ${s.origin} &rarr; ${s.destination}</div>
            <div class="queue-item-meta">
              <span>${s.containers}</span>
              <span>${s.value}</span>
              <span>${formatStatus(s.status)}</span>
            </div>
          </div>`;
        }).join('');
      }

      updateStats();
    }

    function getSLAInfo(s) {
      const now = new Date();
      const deadline = new Date(s.slaDeadline);
      const diff = deadline - now;
      const hours = Math.round(diff / 3600000);
      if (diff < 0) return { html: '<span class="sla-badge sla-overdue">OVERDUE</span>', label: 'Overdue', cls: 'sla-overdue' };
      if (hours <= 4) return { html: `<span class="sla-badge sla-urgent">${hours}h left</span>`, label: `${hours}h left`, cls: 'sla-urgent' };
      if (hours <= 24) return { html: `<span class="sla-badge sla-urgent">${hours}h</span>`, label: `${hours}h`, cls: 'sla-urgent' };
      return { html: `<span class="sla-badge sla-ok">${Math.round(hours/24)}d</span>`, label: `${Math.round(hours/24)}d`, cls: 'sla-ok' };
    }

    function formatStatus(s) {
      return { pending_review: 'Pending Review', approved: 'Approved', rejected: 'Rejected', on_hold: 'On Hold' }[s] || s;
    }

    function statusClass(s) {
      return 'status-' + s.replace('_', '-');
    }

    function selectItem(id) {
      selectedId = id;
      const s = SHIPMENTS.find(x => x.id === id);
      if (!s) return;
      renderList();
      renderDetail(s);
      // Mobile: show detail
      document.getElementById('detail-pane').classList.add('mobile-show');
      document.getElementById('queue-list-pane').classList.add('mobile-hide');
    }

    function mobileBack() {
      document.getElementById('detail-pane').classList.remove('mobile-show');
      document.getElementById('queue-list-pane').classList.remove('mobile-hide');
    }

    function renderDetail(s) {
      document.getElementById('detail-empty').style.display = 'none';
      const c = document.getElementById('detail-content');
      c.style.display = 'block';

      const docItems = s.documents.map(d => {
        const icon = d.status === 'ok' ? '<span class="doc-status-icon doc-ok">\u2713</span>'
                   : d.status === 'missing' ? '<span class="doc-status-icon doc-missing">\u2717</span>'
                   : '<span class="doc-status-icon doc-pending">\u2026</span>';
        return `<li>${icon}<span class="doc-name">${d.name}</span><span class="doc-note">${d.note}</span></li>`;
      }).join('');

      const flagItems = s.flags.map(f => `<span class="flag-tag flag-${f.level}">${f.text}</span>`).join('');

      const timelineItems = s.timeline.map(t => `<div class="timeline-entry"><span class="timeline-time">${t.time}</span><span class="timeline-text">${t.text}</span></div>`).join('');

      const isActionable = s.status === 'pending_review' || s.status === 'on_hold';

      c.innerHTML = `
        <button class="mobile-back-btn" onclick="mobileBack()">\u2190 Back to list</button>
        <div class="detail-header">
          <div>
            <div class="detail-title">${s.id} &mdash; ${s.typeLabel}</div>
            <div class="detail-subtitle">${s.shipper} \u2192 ${s.consignee}</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="status-badge ${statusClass(s.status)}">${formatStatus(s.status)}</span>
          </div>
        </div>

        <div class="detail-section">
          <div class="detail-section-title">Shipment Details</div>
          <div class="detail-grid">
            <span class="detail-label">Route</span><span class="detail-value">${s.route}</span>
            <span class="detail-label">Carrier</span><span class="detail-value">${s.carrier}</span>
            <span class="detail-label">Vessel / Voyage</span><span class="detail-value">${s.vessel} (${s.voyage})</span>
            <span class="detail-label">Containers</span><span class="detail-value">${s.containers}</span>
            <span class="detail-label">Weight</span><span class="detail-value">${s.weight}</span>
            <span class="detail-label">Declared Value</span><span class="detail-value">${s.value}</span>
            <span class="detail-label">HS Code</span><span class="detail-value">${s.hsCode}</span>
            <span class="detail-label">SLA Deadline</span><span class="detail-value">${new Date(s.slaDeadline).toLocaleString()}</span>
          </div>
        </div>

        <div class="detail-section">
          <div class="detail-section-title">Compliance Flags</div>
          <div class="flag-list">${flagItems || '<span style="font-size:11px;color:var(--text-secondary)">No flags</span>'}</div>
        </div>

        <div class="detail-section">
          <div class="detail-section-title">Document Checklist (${s.documents.filter(d=>d.status==='ok').length}/${s.documents.length} verified)</div>
          <ul class="doc-checklist">${docItems}</ul>
        </div>

        <div class="detail-section">
          <div class="detail-section-title">Activity Timeline</div>
          <div class="timeline">${timelineItems}</div>
        </div>

        <div class="detail-section">
          <div class="detail-section-title">Reviewer Notes</div>
          <textarea class="review-notes" id="review-notes" placeholder="Add review notes...">${s.notes}</textarea>
        </div>

        ${isActionable ? `
        <div class="detail-actions" style="margin-top:8px">
          <button class="btn-action btn-approve" onclick="doAction('${s.id}','approved')">Approve &amp; Clear</button>
          <button class="btn-action btn-hold" onclick="doAction('${s.id}','on_hold')">Place on Hold</button>
          <button class="btn-action btn-reject" onclick="doAction('${s.id}','rejected')">Reject &amp; Request Correction</button>
        </div>` : `<div style="font-size:11px;color:var(--text-secondary);margin-top:8px">This shipment has been <strong>${formatStatus(s.status).toLowerCase()}</strong>. No further action required.</div>`}
      `;
    }

    function doAction(id, newStatus) {
      const s = SHIPMENTS.find(x => x.id === id);
      if (!s) return;
      const notes = document.getElementById('review-notes').value;
      s.notes = notes;

      const now = new Date();
      const timeStr = String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0') + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
      const actionText = { approved: 'Approved and cleared', on_hold: 'Placed on hold', rejected: 'Rejected \u2014 correction requested' }[newStatus];
      s.timeline.push({ time: timeStr, text: `${actionText} by reviewer` + (notes ? ` \u2014 "${notes}"` : '') });
      s.status = newStatus;

      selectedId = id;
      renderList();
      renderDetail(s);
    }

    function setFilter(f) {
      currentFilter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
      renderList();
    }

    function applySearch() { renderList(); }

    function updateStats() {
      document.getElementById('stat-total').textContent = SHIPMENTS.length;
      document.getElementById('stat-overdue').textContent = SHIPMENTS.filter(s => new Date(s.slaDeadline) < new Date() && s.status !== 'approved').length;
      document.getElementById('stat-pending').textContent = SHIPMENTS.filter(s => s.status === 'pending_review').length;
      document.getElementById('stat-cleared').textContent = SHIPMENTS.filter(s => s.status === 'approved').length;
    }

    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent = now.toLocaleString('en-GB', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit' }) + ' UTC';
    }

    // --- Init ---
    renderList();
    updateClock();
    setInterval(updateClock, 1000);
    // Auto-refresh SLA badges every minute
    setInterval(() => { renderList(); if (selectedId) { const s = SHIPMENTS.find(x=>x.id===selectedId); if(s) renderDetail(s); } }, 60000);
  </script>
</body>
